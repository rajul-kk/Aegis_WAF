[theme]
# Mirrors the tokens in frontend/theme.py / docs/synaptiq-interface-remixed-design.md
# so Streamlit's own chrome (primary buttons, etc.) matches the custom-CSS
# parts of the page instead of Streamlit's default red.
primaryColor = "#10B981"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F9FAFB"
textColor = "#111827"
font = "serif"
